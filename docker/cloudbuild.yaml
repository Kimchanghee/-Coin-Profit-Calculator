# Google Cloud Build configuration for Cloud Run deployment
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/coin-profit-calculator:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/coin-profit-calculator:latest'
      - '-f'
      - 'docker/Dockerfile'
      - '.'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/coin-profit-calculator:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'coin-profit-calculator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/coin-profit-calculator:$SHORT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'asia-northeast3'  # Seoul region
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/coin-profit-calculator:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/coin-profit-calculator:latest'

timeout: '1200s'
